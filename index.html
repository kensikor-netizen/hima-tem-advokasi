<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIMA TEM - Advokasi</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #050505;
  color: white;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.5s;
}

.loader-text {
  color: #00eaff;
  font-size: 24px;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #00eaff; }
  to { text-shadow: 0 0 20px #00eaff, 0 0 40px #00eaff; }
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(0,0,0,0.8);
}

nav h2 { color: #00eaff; }

nav a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
  background: radial-gradient(circle, #0a2a33, #000);
}

.hero h1 {
  font-size: 45px;
  color: #00eaff;
}

.hero p { color: #aaa; }

/* CARD */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 40px;
}

.card {
  width: 280px;
  margin: 15px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(0,255,255,0.5);
}

.card h3 { color: #00eaff; }

button {
  margin-top: 10px;
  padding: 10px;
  border: 1px solid #00eaff;
  background: transparent;
  color: #00eaff;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #00eaff;
  color: black;
}

footer {
  text-align: center;
  padding: 20px;
  color: gray;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loader">
  <div class="loader-text">Loading HIMA TEM...</div>
</div>

<nav>
  <h2>HIMA TEM</h2>
  <div>
    <a href="#">Home</a>
    <a href="#lapor">Laporan</a>
    <a href="#saran">Saran</a>
    <a href="#cerita">Cerita</a>
  </div>
</nav>

<section class="hero">
  <h1>Divisi Advokasi</h1>
  <p>Wadah aspirasi mahasiswa</p>
</section>

<div class="container">

  <div class="card" id="lapor">
    <h3>📢 Laporan</h3>
    <button onclick="openForm('lapor')">Isi</button>
  </div>

  <div class="card" id="saran">
    <h3>💡 Saran</h3>
    <button onclick="openForm('saran')">Isi</button>
  </div>

  <div class="card" id="cerita">
    <h3>🤝 Cerita</h3>
    <button onclick="openForm('cerita')">Isi</button>
  </div>

</div>

<footer>
© 2026 HIMA TEM - Advokasi
</footer>

<script>
// FIX LOADER (ANTI STUCK)
setTimeout(function(){
  var loader = document.getElementById("loader");
  if(loader){
    loader.style.opacity = "0";
    setTimeout(() => loader.style.display = "none", 500);
  }
}, 1500);

// FORM HANDLER
function openForm(type){
  if(type === "lapor"){
    window.open("https://docs.google.com/forms/d/e/1FAIpQLSe5jgCIKMeCkfTu1yIWHnOEAVuyD4E9KMC7PAPfbveqpgbxuw/viewform");
  }
  if(type === "saran"){
    window.open("https://docs.google.com/forms/d/e/1FAIpQLScMxTlqohZTMCty3Jg9NSECTIbbZaAgy4CQ652uOhPQx4uL_A/viewform");
  }
  if(type === "cerita"){
    window.open("https://docs.google.com/forms/d/e/1FAIpQLSeJuq-gawGni8c804qlugmXUGKoKf1gT-eQfAfFCalCxJQI8w/viewform");
  }
}
</script>

</body>
</html>
