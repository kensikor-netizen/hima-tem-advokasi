<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIMA TEM - Advokasi</title>

<link rel="icon" href="logo.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#000,#001a1f);
  color:white;
  overflow-x:hidden;
}

/* LOADING */
#loading{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.loader{
  width:50px;height:50px;
  border:5px solid #00eaff;
  border-top:5px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
}
nav a{color:white;margin-left:15px;text-decoration:none;}
nav a:hover{color:#00eaff;}

.logo{display:flex;align-items:center;}
.logo img{width:45px;margin-right:10px;}

/* HERO */
.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:80px 50px;
  flex-wrap:wrap;
}

.hero h1{
  font-size:50px;
  background:linear-gradient(90deg,#00eaff,#00ffcc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{color:#aaa;margin:15px 0;}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#00eaff,#00ffcc);
  cursor:pointer;
  transition:0.3s;
}
button:hover{transform:scale(1.05);}

/* CARD */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:30px;
}

.card{
  width:300px;
  margin:15px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(0,255,255,0.2);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 30px #00eaff;
}

.page{display:none;text-align:center;padding:100px 20px;}

input,textarea{
  width:80%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00eaff;
  color:black;
  padding:10px;
  border-radius:8px;
  display:none;
}

/* SCROLL ANIM */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}
.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div id="loading"><div class="loader"></div></div>

<nav>
  <div class="logo">
    <img src="logo.png">
    <h2>HIMA TEM</h2>
  </div>
</nav>

<section class="hero fade">
  <div>
    <h1>SUARAMU LAYAK DIDENGAR</h1>
    <p>Ruang aman mahasiswa untuk berbicara dan didengar.</p>
    <button onclick="scrollMenu()">Mulai</button>
  </div>
  <img src="logo.png" width="220">
</section>

<div class="container fade" id="menu">

  <div class="card">
    <h3>Laporkan Masalah</h3>
    <button onclick="showPage('laporPage')">Masuk</button>
  </div>

  <div class="card">
    <h3>Kritik & Saran</h3>
    <button onclick="openAnon()">Masuk</button>
  </div>

  <div class="card">
    <h3>Teman Cerita</h3>
    <button onclick="showPage('ceritaPage')">Masuk</button>
  </div>

</div>

<!-- LAPOR -->
<div id="laporPage" class="page">
  <h2>Laporan</h2>
  <button onclick="openForm()">Form</button><br><br>
  <button onclick="backHome()">Kembali</button>
</div>

<!-- CERITA -->
<div id="ceritaPage" class="page">
  <h2>Teman Cerita</h2>

  <button onclick="ceritaLangsung()">Cerita Langsung</button>

  <form action="https://formspree.io/f/xdayjjob" method="POST" onsubmit="kirim()">
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="cerita" placeholder="Ceritamu..." required></textarea>
    <button type="submit">Kirim</button>
  </form>

  <button onclick="backHome()">Kembali</button>
</div>

<div id="toast">Berhasil dikirim 🙏</div>

<script>
window.onload=()=>setTimeout(()=>document.getElementById("loading").style.display="none",800);

function scrollMenu(){
  document.getElementById("menu").scrollIntoView({behavior:"smooth"});
}

function showPage(id){
  document.querySelector(".hero").style.display="none";
  document.querySelector(".container").style.display="none";
  document.getElementById(id).style.display="block";
}

function backHome(){
  document.querySelector(".hero").style.display="flex";
  document.querySelector(".container").style.display="flex";
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
}

function openForm(){
  window.open("https://docs.google.com/forms/d/e/1FAIpQLSelJCJ8AZJ-ZVruC2YTLw15faBU29II84A8YV8ocYZlHcBdzQ/viewform");
}

function openAnon(){
  window.open("https://ngl.link/advokasihimatem");
}

function ceritaLangsung(){
  window.open("https://docs.google.com/forms/d/e/1FAIpQLSf66VI_GwE8l_5kfrj0xlXivlcNGh1FmhfuBULLyQ-BDACAsw/viewform");
}

function kirim(){
  setTimeout(()=>document.getElementById("toast").style.display="block",500);
}

/* SCROLL ANIM */
const faders=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
  faders.forEach(el=>{
    const top=el.getBoundingClientRect().top;
    if(top<window.innerHeight-50){el.classList.add('show');}
  });
});
</script>

</body>
</html>
