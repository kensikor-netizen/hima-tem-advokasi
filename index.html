<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family:'Segoe UI',sans-serif;
  background:#000;
  color:white;
}

/* PARTICLE */
#particles-js {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

nav a {
  color:white;
  margin-left:15px;
  text-decoration:none;
}

nav a:hover { color:#00eaff; }

.logo {
  display:flex;
  align-items:center;
}

.logo img {
  width:45px;
  margin-right:10px;
  filter:drop-shadow(0 0 10px cyan);
}

.logo h2 { color:#00eaff; }

/* HERO */
.hero {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:80px 50px;
  flex-wrap:wrap;
}

.hero-text { max-width:500px; }

.hero-text h1 {
  font-size:50px;
  color:#00eaff;
}

.hero-text p {
  color:#aaa;
  margin:15px 0;
}

.badge {
  border:1px solid #00eaff;
  padding:8px 12px;
  margin:5px;
  display:inline-block;
  border-radius:10px;
}

/* BUTTON */
button {
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00eaff;
  cursor:pointer;
  transition:0.3s;
}
button:hover { background:#00c3d9; }

/* CARD */
.container {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  padding:30px;
}

.card {
  width:300px;
  margin:15px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 20px rgba(0,255,255,0.2);
  text-align:center;
  transition:0.3s;
}
.card:hover {
  transform:translateY(-10px);
  box-shadow:0 0 40px rgba(0,255,255,0.5);
}

.card h3 { color:#00eaff; }

/* PAGE */
.page {
  display:none;
  text-align:center;
  padding:100px 20px;
}

.page h2 { color:#00eaff; }

.privacy {
  font-size:13px;
  color:gray;
  max-width:650px;
  margin:15px auto;
}

/* 🔥 FIX INPUT DARK MODE + PREMIUM STYLE */
input, textarea {
  width:80%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;

  background:rgba(255,255,255,0.08);
  color:white;
  backdrop-filter:blur(5px);
  transition:0.3s;
}

/* placeholder */
input::placeholder, textarea::placeholder {
  color:#aaa;
}

/* saat diketik */
input:focus, textarea:focus {
  outline:none;
  box-shadow:0 0 10px #00eaff;
  background:rgba(255,255,255,0.15);
}

/* SECTION */
.section {
  text-align:center;
  padding:60px 20px;
}
.section h2 { color:#00eaff; }

/* TOAST */
#toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00eaff;
  color:black;
  padding:10px 15px;
  border-radius:8px;
  display:none;
}

/* MOBILE */
@media(max-width:768px){
  .hero { flex-direction:column; text-align:center; }
  .hero img { margin-top:20px; }
}
</style>
